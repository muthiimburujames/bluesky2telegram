name: F1 BlueSky to Telegram

"on":
  # Backup schedule — primary trigger is via external scheduler (cron-job.org)
  # hitting the workflow_dispatch endpoint every 5 minutes.
  # This cron is a fallback in case the external scheduler goes down.
  schedule:
    - cron: '*/30 * * * *'

  # Allows you to manually trigger from GitHub's Actions tab
  workflow_dispatch:

# Prevent overlapping runs (if external scheduler and GitHub cron fire close together)
concurrency:
  group: f1-bot
  cancel-in-progress: false

# Give the workflow permission to push state changes back to the repo
permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '2' }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN || '10' }}
          ENABLE_KEYWORD_SEARCH: ${{ vars.ENABLE_KEYWORD_SEARCH || 'false' }}
          EXTRA_BSKY_ACCOUNTS: ${{ vars.EXTRA_BSKY_ACCOUNTS || '' }}
          RSS_FEEDS: ${{ vars.RSS_FEEDS || '' }}
        run: python bot.py

      - name: Commit updated state
        run: |
          git config user.name "F1 Bot"
          git config user.email "bot@github-actions"
          git add state/
          git diff --staged --quiet || git commit -m "Update sent posts state [skip ci]"
          git pull --rebase origin main || true
          git push || echo "⚠ Push failed — state will be re-synced on next run"
